{% extends "base.html" %}
{% block title %}Change Password — Bar POS{% endblock %}
{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <h1 style="font-size:22px;">Change Password</h1>
    <form method="post" class="stack">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label>Current Password <input type="password" name="current_password" required></label>
      <label>New Password <input type="password" name="new_password" required></label>
      <label>Confirm New Password <input type="password" name="confirm_password" required></label>
      <button type="submit" class="btn btn-amber btn-block">Update Password</button>
    </form>
  </div>
</div>
{% endblock %}
